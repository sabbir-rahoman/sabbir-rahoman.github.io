<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Live Stream | Football Match</title>
    
    <!-- DPlayer CSS (প্রফেশনাল প্লেয়ারের ডিজাইনের জন্য) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/dplayer/1.27.1/DPlayer.min.css">
    
    <!-- Font Awesome (আইকনের জন্য) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-base: #0a0a0f;
            --accent-red: #e11d48;
            --text-main: #ffffff;
        }
        
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, rgba(225, 29, 72, 0.05) 0%, transparent 50%);
        }

        /* হেডার ডিজাইন */
        .header {
            width: 100%;
            background: rgba(20, 20, 30, 0.95);
            padding: 15px 0;
            text-align: center;
            border-bottom: 1px solid rgba(225, 29, 72, 0.3);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 800;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .live-badge {
            background: var(--accent-red);
            color: white;
            font-size: 13px;
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: 800;
            animation: blink 2s infinite;
            box-shadow: 0 0 10px rgba(225, 29, 72, 0.5);
        }

        /* প্লেয়ার কন্টেইনার */
        .player-wrapper {
            width: 95%;
            max-width: 1100px;
            margin-top: 30px;
            background: #000;
            border-radius: 12px;
            padding: 5px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8), 0 0 20px rgba(225, 29, 72, 0.15);
            border: 1px solid rgba(255,255,255,0.05);
        }

        #dplayer {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 16/9;
        }

        /* নিচের ইনফো বার */
        .stream-info {
            width: 95%;
            max-width: 1100px;
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.03);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }

        .stream-title h2 { margin: 0 0 5px 0; font-size: 20px; }
        .stream-title p { margin: 0; color: #94a3b8; font-size: 14px; }
        
        .viewers { 
            color: #e11d48; 
            font-weight: 600; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            background: rgba(225, 29, 72, 0.1);
            padding: 8px 15px;
            border-radius: 50px;
            border: 1px solid rgba(225, 29, 72, 0.2);
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* মোবাইল রেসপন্সিভ */
        @media (max-width: 768px) {
            .header h1 { font-size: 20px; }
            .stream-info { flex-direction: column; text-align: left; align-items: flex-start; gap: 15px; }
            #dplayer { aspect-ratio: auto; min-height: 250px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>
            <i class="fa-solid fa-trophy" style="color: #fbbf24;"></i> 
            এলাকার ফুটবল ম্যাচ 
            <span class="live-badge">LIVE</span>
        </h1>
    </div>

    <div class="player-wrapper">
        <!-- DPlayer Container -->
        <div id="dplayer"></div>
    </div>

    <div class="stream-info">
        <div class="stream-title">
            <h2><i class="fa-solid fa-video" style="color: #3b82f6;"></i> সরাসরি সম্প্রচার: এক্সক্লুসিভ লাইভ</h2>
            <p>গোপালগঞ্জ থেকে সরাসরি | Streamed by Sabbir Rahoman</p>
        </div>
        <div class="viewers">
            <i class="fa-solid fa-users"></i> Watching Now: 1.2k
        </div>
    </div>

    <!-- FLV.js (সার্ভার থেকে ভিডিও আনার ইঞ্জিন) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flv.js/1.6.2/flv.min.js"></script>
    
    <!-- DPlayer (প্রফেশনাল ইউজার ইন্টারফেসের ইঞ্জিন) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dplayer/1.27.1/DPlayer.min.js"></script>

    <script>
        // প্রফেশনাল প্লেয়ার ইনিশিয়ালাইজ করা
        const dp = new DPlayer({
            container: document.getElementById('dplayer'),
            live: true,             // লাইভ মোড চালু (টাইমলাইন হাইড করবে)
            autoplay: true,         // অটো প্লে
            theme: '#e11d48',       // প্লেয়ারের থিম কালার (লাল)
            lang: 'en',
            hotkey: true,           // কীবোর্ড শর্টকাট সাপোর্ট
            preload: 'auto',
            volume: 0.8,            // ডিফল্ট সাউন্ড ৮০%
            video: {
                // এখানে আপনার OBS-এর সঠিক Stream Key (fifalive) দেওয়া হলো
                url: 'https://hatchery-uncheck-wreath.ngrok-free.dev/live/fifalive.flv',
                type: 'flv',
            },
        });

        // প্লেয়ার চালু হলে এরর বা বাফারিং হ্যান্ডলিং
        dp.on('error', function () {
            console.warn('ভিডিও লোড হচ্ছে না। নিশ্চিত করুন OBS স্ট্রিমিং চালু আছে এবং Ngrok লিংক সঠিক আছে।');
        });
    </script>

</body>
</html>
